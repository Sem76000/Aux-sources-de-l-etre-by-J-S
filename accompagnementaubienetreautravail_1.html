<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accompagnement au bien-être au travail | By J</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:italic,wght@0,400;0,700&display=swap" rel="stylesheet">
    <style>
        /* Styles issus de index.html */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Lora', serif; background-color: #000; color: white; }
        .fond-site {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('arriere_plan.jpg');
            min-height: 100vh; width: 100%; background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; padding: 2rem 0; box-sizing: border-box;
        }

        h1 { 
            font-family: "Tempus Sans ITC", "Tempus Sans", cursive, sans-serif; 
            font-weight: 400; 
            font-size: 3rem; 
            margin-bottom: 4rem; 
            letter-spacing: 0.1rem; 
            text-align: center; 
            text-transform: none; 
            color: #f3f3f3; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .container-rectangles { display: flex; flex-direction: column; gap: 1.5rem; align-items: center; width: 100%; }

        /* Transformation des rectangles en liens cliquables */
        .rectangle {
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            text-align: center;
            width: 300px; 
            min-height: 80px; 
            padding: 1rem;
            background-color: rgba(30, 30, 30, 0.6);
            color: white;
            text-decoration: none; /* Retire le soulignement du lien */
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.8),
                inset 1px 1px 2px rgba(255, 255, 255, 0.3),
                inset -1px -1px 2px rgba(0, 0, 0, 0.5);
        }

        /* Effet au survol identique à l'index */
        .rectangle:hover {
            background-color: rgba(255, 255, 255, 0.9);
            color: #1c1917;
            transform: translateY(-2px);
        }

        .rectangle span { 
            display: block; 
            transform: scaleY(1.4); 
            letter-spacing: 0.15rem; 
            font-weight: 700; 
            font-family: 'Cinzel', serif;
        }
        
        .subtitle { 
            font-family: 'Lora', serif; 
            text-transform: none; 
            font-style: italic; 
            margin-top: 8px; 
            font-size: 0.85rem; 
            opacity: 0.8; 
        }

        .btn-retour { margin-top: 3rem; color: white; text-decoration: none; font-family: 'Cinzel', serif; font-size: 0.8rem; border-bottom: 1px solid white; padding-bottom: 2px; opacity: 0.7; transition: 0.3s; }
        .btn-retour:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="fond-site">
        <h1>Accompagnement au bien-être au travail</h1>

        <div class="container-rectangles">
            <a href="individuel.html" class="rectangle">
                <span>En individuel</span>
            </a>
            
            <a href="collectif.html" class="rectangle">
                <span>En collectif</span>
            </a>
            
            <a href="evenements.html" class="rectangle">
                <span>Évènements ponctuels</span>
                <div class="subtitle">(ateliers + afterwork)</div>
            </a>
        </div>

        <a href="index.html" class="btn-retour">RETOUR À L'ACCUEIL</a>
    </div>
</body>
</html>
