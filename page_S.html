<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aux Sources de l'être | Radiesthésie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:italic,wght@0,400;0,700&display=swap" rel="stylesheet">
    <style>
        h2, h3 { font-family: 'Cinzel', serif; }
        body { font-family: 'Lora', serif; }
        
        /* Titre en Tempus Sans ITC */
        h1 { 
            font-family: "Tempus Sans ITC", "Tempus Sans", cursive, sans-serif !important;
            font-weight: 400 !important;
            text-transform: none !important;
            letter-spacing: 0.1rem !important;
        }

        .bg-nature { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80'); 
            background-size: cover; 
            background-position: center;
        }

        .btn-accueil {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 50;
            border: 1px solid white;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            color: white;
            text-transform: uppercase;
            background-color: rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-accueil span {
            display: inline-block;
            transform: scaleY(1.8);
            letter-spacing: 0.2em;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* STYLE HOMOGÈNE (Effet Relief) */
        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 0.8rem 1rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            text-align: center;
            width: 280px; 
            height: 55px; 
            font-size: 0.85rem;
            background-color: rgba(30, 30, 30, 0.6);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            
            box-shadow: 
                4px 4px 8px rgba(0, 0, 0, 0.8),
                inset 1px 1px 2px rgba(255, 255, 255, 0.3),
                inset -1px -1px 2px rgba(0, 0, 0, 0.5);
        }

        .btn-outline span {
            display: inline-block;
            transform: scaleY(1.6);
            letter-spacing: 0.2em;
            font-weight: 700;
            font-family: 'Cinzel', serif;
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.9);
            color: #1c1917;
            transform: translateY(-2px);
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body class="bg-stone-900 overflow-hidden">

    <a href="index.html" class="btn-accueil">
        <span>Accueil</span>
    </a>

    <section class="bg-nature h-screen flex flex-col items-center text-white text-center px-4 pt-20 pb-24">
        
        <div class="w-full">
            <h1 class="text-6xl md:text-[4rem] mb-4">
                Outils de Radiesthésie
            </h1>
            </div>
        
        <div class="flex-grow flex items-center justify-center">
            <p class="text-xl md:text-2xl italic opacity-90 font-light max-w-2xl">
                Artisanat sacré : pendules et baguettes façonnés à la main dans le respect du bois.
            </p>
        </div>
        
        <div class="w-full mt-auto">
            <div class="flex flex-col lg:flex-row gap-6 items-center justify-center">
                <a href="baguettes.html" class="btn-outline">
                    <span>BAGUETTES</span>
                </a>

                <a href="pendules.html" class="btn-outline">
                    <span>PENDULES</span>
                </a>

                <a href="ateliers.html" class="btn-outline">
                    <span>ATELIERS</span>
                </a>

                <a href="contact.html" class="btn-outline">
                    <span>CONTACT</span>
                </a>
            </div>
        </div>

    </section>

    <footer class="absolute bottom-6 w-full text-center text-white/40 text-[10px] tracking-[0.5em] uppercase">
        © 2026 Aux Sources de l'être by J&S
    </footer>

</body>
</html>
