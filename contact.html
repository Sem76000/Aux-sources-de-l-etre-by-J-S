<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Aux Sources de l'être</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:italic,wght@0,400;0,700&display=swap" rel="stylesheet">
    <style>
        h1, h2, h3 { font-family: 'Cinzel', serif; }
        body { font-family: 'Lora', serif; }
        .bg-forest { 
            background: linear-gradient(rgba(252, 250, 247, 0.9), rgba(252, 250, 247, 0.9)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
        }
    </style>
</head>
<body class="bg-[#fcfaf7] text-stone-800 min-h-screen flex flex-col">

    <nav class="p-6 border-b border-stone-200 flex justify-between items-center bg-white sticky top-0 z-50">
        <a href="index.html" class="text-lg font-bold tracking-[0.2em] text-emerald-900 uppercase">Aux Sources de l'être</a>
        <button onclick="history.back()" class="text-xs uppercase tracking-widest hover:text-emerald-700 transition cursor-pointer">← Retour</button>
    </nav>

    <main class="flex-grow flex items-center justify-center py-16 px-4 bg-forest">
        <div class="max-w-2xl w-full bg-white p-8 md:p-12 shadow-2xl rounded-sm border border-stone-100">
            <div class="text-center mb-10">
                <h1 class="text-3xl text-emerald-900 mb-2 tracking-widest uppercase">Contactez-nous</h1>
                <div class="w-16 h-0.5 bg-emerald-800 mx-auto mb-4"></div>
                <p class="text-stone-600 italic">Une question ou une demande personnalisée ?</p>
            </div>

            <form action="#" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-stone-400 mb-2 font-bold">Nom</label>
                        <input type="text" name="nom" required class="w-full border-b border-stone-200 py-2 focus:border-emerald-800 focus:outline-none bg-transparent transition">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-widest text-stone-400 mb-2 font-bold">Prénom</label>
                        <input type="text" name="prenom" required class="w-full border-b border-stone-200 py-2 focus:border-emerald-800 focus:outline-none bg-transparent transition">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-stone-400 mb-2 font-bold">Email</label>
                    <input type="email" name="email" required class="w-full border-b border-stone-200 py-2 focus:border-emerald-800 focus:outline-none bg-transparent transition">
                </div>

                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-stone-400 mb-2 font-bold">Votre Message</label>
                    <textarea id="message-champ" name="message" rows="5" required class="w-full border border-stone-100 p-4 focus:border-emerald-800 focus:outline-none bg-stone-50 transition"></textarea>
                </div>

                <div class="text-center">
                    <button type="submit" class="bg-emerald-900 text-white px-12 py-4 tracking-[0.2em] font-bold hover:bg-emerald-700 transition duration-300 shadow-lg uppercase text-sm">
                        Envoyer ma demande
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="py-8 text-center text-stone-400 text-[10px] tracking-widest uppercase">
        © 2026 Aux Sources de l'être by J&S
    </footer>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const champMessage = document.getElementById('message-champ');

            if (champMessage) {
                const typeAtelier = urlParams.get('type');
                const dateAtelier = urlParams.get('date');
                const ref = urlParams.get('ref');
                const objet = urlParams.get('objet');
                const messageUrl = urlParams.get('message'); // Récupère le texte de l'Oracle

                // 0. Cas TEXTE PRÉDÉFINI (depuis page Oracle)
                if (messageUrl) {
                    champMessage.value = messageUrl;
                }
                // 1. Ateliers
                else if (typeAtelier && dateAtelier) {
                    champMessage.value = "Inscription pour " + typeAtelier + " le " + dateAtelier + "\nNombre de personnes : ";
                } 
                // 2. Produits (pendules/baguettes)
                else if (ref) {
                    if (ref.toLowerCase().includes("baguettes")) {
                        champMessage.value = ref + " : ";
                    } else {
                        champMessage.value = "Commande du pendule n°" + ref + " : ";
                    }
                }
                // 3. Cas GÉOBIOLOGIE (depuis page géobiologie)
                else if (objet === 'geobiologie') {
                    champMessage.value = "Contact pour Géobiologie : ";
                }
                // 4. Cas QUI SUIS-JE (depuis présentation_s)
                else if (objet === 'perso') {
                    champMessage.value = "Contact outil personnalisé ou géobiologie? ";
                }
                
                if (champMessage.value) {
                    champMessage.focus();
                }
            }
        });
    </script>
</body>
</html>
